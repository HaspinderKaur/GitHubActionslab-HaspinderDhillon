name: Multi Platform Testing

on:
  pull_request:
    branches:
      - main

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show Ubuntu Information
        run: |
          echo "Running on Ubuntu"
          uname -a

      - name: Create File
        run: |
          echo "Hello from Ubuntu" > ubuntu.txt
          cat ubuntu.txt

  windows-job:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show Windows Information
        run: systeminfo

      - name: Create File
        run: |
          echo Hello from Windows > windows.txt
          type windows.txt

  macos-job:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show macOS Information
        run: |
          echo "Running on macOS"
          uname -a

      - name: Create File
        run: |
          echo "Hello from macOS" > macos.txt
          cat macos.txt
